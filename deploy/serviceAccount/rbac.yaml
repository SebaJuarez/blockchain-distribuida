apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-reader-role
  namespace: apps
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rbac-binding
  namespace: apps
subjects:
  - kind: ServiceAccount
    name: blockchain-sa
    namespace: apps
roleRef:
  kind: Role
  name: app-reader-role
  apiGroup: rbac.authorization.k8s.io