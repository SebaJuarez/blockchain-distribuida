apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodo-coordinador
  namespace: apps
  labels:
    app: nodo-coordinador
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodo-coordinador
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nodo-coordinador
    spec:
      # --- SEGMENTACIÓN ---
      nodeSelector:
        role: "app"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # --------------------------------
      containers:
        - name: nodo-coordinador
          image: sebajuarez/coordinador:3dc1d5f
          ports:
            - containerPort: 8080
          # --- LÍMITES DE RECURSOS ---
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          # ---------------------------
          envFrom:
            - configMapRef:
                name: coordinador-config
            - secretRef:
                name: coordinador-secrets