name: Deploy Observability & Monitoring

on:
  workflow_run:
    workflows: ["Terraform Plan & Apply"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GKE_CLUSTER_NAME: ${{ secrets.GKE_CLUSTER_NAME }}
      GKE_CLUSTER_LOCATION: ${{ secrets.GKE_CLUSTER_LOCATION }} 
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Autenticar con GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ env.GOOGLE_CREDENTIALS }}

      - name: Obtener credenciales de GKE
        uses: google-github-actions/get-gke-credentials@v1
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location:     ${{ env.GKE_CLUSTER_LOCATION }}
          project_id:   ${{ env.GCP_PROJECT_ID }}
          
      - name: Aplicar manifests de Observability y Monitoring
        run: |
          kubectl apply -f deploy/namespaces/
          kubectl apply -f deploy/services/monitoring/
          kubectl apply -f observability/grafana/provisioning/alerting/
          kubectl apply -f observability/grafana/provisioning/dashboards/
          kubectl apply -f observability/grafana/provisioning/datasources/
          kubectl apply -f observability/prometheus/
          kubectl apply -f observability/promtail/
