deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: gcs
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: gcs
    gcs:
      bucket_name: "loki-logs-majestic-stage-484717-f5"

memcachedExporter:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
  
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  persistence:
    enabled: false