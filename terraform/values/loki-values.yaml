deploymentMode: SingleBinary

loki:
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: gcs
        schema: v13
        index:
          prefix: index_
          period: 24h
  
  storage:
    type: gcs
    bucketNames:
      chunks: "${bucket_name}"
      ruler:  "${bucket_name}"
      admin:  "${bucket_name}"
    gcs:
      bucket_name: "${bucket_name}"

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi