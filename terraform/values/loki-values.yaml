deploymentMode: SingleBinary

loki:
  auth_enabled: false
  storage:
    type: gcs
    bucketNames:
      chunks: "${bucket_name}"
      ruler:  "${bucket_name}"
      admin:  "${bucket_name}"
    gcs:
      bucket_name: "${bucket_name}"

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi