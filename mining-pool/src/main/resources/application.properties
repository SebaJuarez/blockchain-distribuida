spring.application.name=mining-pool
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${SERVER_PORT:8081}
spring.cloud.compatibility-verifier.enabled=false

# redis config
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
#rabbit config
spring.rabbitmq.host=${SPRING_RABBIT_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBIT_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBIT_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBIT_PASSWORD:guest}

# scheduler config
miner.status-check-interval=${MINER_STATUS_CHECK_INTERVAL:15000}
miner.id=${MINER_ID:Pool-de-mineros}

# Feign client config
feign.hystrix.enabled=false
feign.client.config.default.connectTimeout=${FEIGN_CONNECT_TIMEOUT:5000}
feign.client.config.default.readTimeout=${FEIGN_READ_TIMEOUT:30000}
metadata.coordinator.url=${METADATA_COORDINATOR_URL:localhost:8080}

# GCP
gcp.project-id=${GCP_PROJECT_ID:sdypp-final-501419}
gcp.compute.zone=${GCP_COMPUTE_ZONE:us-central1-a}
gcp.compute.mig-name=${GCP_COMPUTE_MIG_NAME:python-miners-mig}

# Observabilidad
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Resilience 4j
logging.level.io.github.resilience4j=INFO
resilience4j.circuitbreaker.instances.coordinator.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.coordinator.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.coordinator.sliding-window-size=10
resilience4j.circuitbreaker.instances.coordinator.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.coordinator.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.coordinator.automatic-transition-from-open-to-half-open-enabled=true

# Retry Config
resilience4j.retry.instances.coordinator.max-attempts=3
resilience4j.retry.instances.coordinator.wait-duration=500ms
resilience4j.retry.instances.coordinator.enable-exponential-backoff=true
resilience4j.retry.instances.coordinator.exponential-backoff-multiplier=2